version: "3.9"
services:
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: opensearch
    restart: unless-stopped

    environment:
      discovery.type: single-node
      plugins.security.disabled: "false"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
         soft: 65536
         hard: 65536
    volumes:
      - os_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    networks:
      - nids_network
    healthcheck:
      test:
       [
         "CMD-SHELL",
         "curl -s -k -u ${OPENSEARCH_ADMIN_USER}:${OPENSEARCH_ADMIN_PASSWORD} https://localhost:9200/_cluster/health | grep -E '\"status\":\"green\"|\"status\":\"yellow\"' || exit 1"
       ]
      interval: 30s
      timeout: 10s
      retries: 10
  dashboards:
    image: opensearchproject/opensearch-dashboards:2.12.0
    container_name: opensearch-dashboards
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_USERNAME: ${OPENSEARCH_ADMIN_USER}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}

      OPENSEARCH_SSL_VERIFICATION_MODE: none
      SERVER_SSL_ENABLED: "false"

    ports:
      - "5601:5601"
    depends_on:
      opensearch:
condition: service_healthy
    networks:
     - nids_network
  nids:
    build:
      context: .
      dockerfile: nids/Dockerfile
    container_name: service_healthy
    privileged: true
    restart: unless-stopped

    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - nids_network
networks:
  nids_network:
    driver: bridge
volumes:
  os_data:
    driver: local
